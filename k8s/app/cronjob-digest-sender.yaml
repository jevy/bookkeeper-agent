apiVersion: batch/v1
kind: CronJob
metadata:
  name: bookkeeper-digest-sender
  labels:
    app: bookkeeper
    component: digest-sender
spec:
  schedule: "0 7 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: bookkeeper
            component: digest-sender
        spec:
          restartPolicy: OnFailure
          containers:
            - name: digest-sender
              image: ghcr.io/jevy/bookkeeper-agent:0.8.3
              args: ["digest-sender"]
              env:
                - name: KAFKA_BOOTSTRAP_SERVERS
                  value: "redpanda.apps.svc.cluster.local:9093"
                - name: SCHEMA_REGISTRY_URL
                  value: "http://redpanda.apps.svc.cluster.local:8081"
                - name: GOOGLE_SHEET_ID
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: GOOGLE_SHEET_ID
                - name: GOOGLE_CREDENTIALS_JSON
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: GOOGLE_CREDENTIALS_JSON
                - name: AWS_REGION
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: AWS_REGION
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: S3_BUCKET
                - name: SES_FROM_ADDRESS
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: SES_FROM_ADDRESS
                - name: DIGEST_TO_ADDRESS
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: DIGEST_TO_ADDRESS
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: bookkeeper
                      key: AWS_SECRET_ACCESS_KEY
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
